# Calibracao para: videos/VIDEO PADRAO.mp4 (960x540, ovos marrons, esteira dupla)
source: "../../videos/VIDEO PADRÃO.mp4"
width: 960
height: 540
fps: 7
show_window: true
crop_roi: false

roi:
  x: 8
  y: 6
  width: 944
  height: 528

# Counting line in the upper third — more time to track before crossing
line:
  x1: 10
  y1: 150
  x2: 950
  y2: 150
  direction: bottom_to_top

# Divisor central (ovos passam pelas pistas laterais)
exclude_zones:
  - x: 400
    y: 0
    width: 160
    height: 540
