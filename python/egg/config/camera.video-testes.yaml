# Calibracao para: videos/VIDEO PARA TESTES.mp4 (848x478, ovos brancos, esteira simples)
source: "../../videos/VIDEO PARA TESTES.mp4"
width: 848
height: 478
fps: 60
show_window: true
crop_roi: false

# ROI amplo da esteira (sem apertar o enquadramento)
roi:
  x: 40
  y: 0
  width: 800
  height: 478

# Counting line in the upper third — more time to track the egg before it crosses
line:
  x1: 60
  y1: 130
  x2: 830
  y2: 130
  direction: bottom_to_top

# No center exclude on single-belt videos (was dropping valid eggs)
exclude_zones: []
