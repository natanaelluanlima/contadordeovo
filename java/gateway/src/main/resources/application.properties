#Geral
app.version=${quarkus.application.version}

# Log
%dev.quarkus.log.level=INFO
%prod.quarkus.log.level=ERROR
quarkus.log.file.enabled=true
quarkus.log.file.path=egg-gateway.log
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId}] %p %s%e%n

# API
quarkus.application.name=egg-gateway
quarkus.http.host=0.0.0.0
quarkus.http.root-path=/gruponeural/egg/gateway/

# Health
quarkus.smallrye-health.root-path=/gruponeural/egg/gateway/health

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept,Origin,X-Signature,X-Timestamp,X-Correlation-ID
quarkus.http.cors.access-control-max-age=24H

# Camel
camel.rest.component=platform-http
camel.rest.bindingMode=json
camel.main.use-mdc-logging=true

# Public Validator (alinhar com EGG_GATEWAY_SIGNATURE_SECRET no site)
public.validator.secret=15be8588f1b1857457edef3848dd6b3587f5ba10

# Dev
%dev.quarkus.http.port=9000
%dev.quarkus.http.insecure-requests=enabled
